<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tiki Venture Capital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌴</text></svg>">
  <link rel="apple-touch-icon" href="og-image.png">

  <meta name="description" content="Tiki Venture Capital — move your mouse.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Tiki Venture Capital">
  <meta property="og:description" content="Move your mouse.">
  <meta property="og:url" content="https://tiki.vc">
  <meta property="og:image" content="https://tiki.vc/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tiki Venture Capital">
  <meta name="twitter:description" content="Move your mouse.">
  <meta name="twitter:image" content="https://tiki.vc/og-image.png">
  <meta name="theme-color" content="#4AAFED">

  <!-- Storm ambience audio. HTMLAudioElement plays more reliably on iOS than
       Web Audio (no AudioContext suspend quirks, no cross-gesture unlock drift).
       Browser preloads via preload="auto". playsinline keeps it from taking
       over the screen on iOS. -->
  <audio id="storm-audio" src="tikinoise.mp3" preload="auto" playsinline webkit-playsinline></audio>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* `position: fixed; inset: 0` + viewport-fit=cover in the <meta> forces
       the element to fill the TRUE viewport (including the area behind the
       iOS URL bar / bottom tab bar). This is more reliable across iOS
       versions than 100lvh, which some older Safari builds interpret as the
       small viewport. Body paints the sky gradient; canvas sits on top and
       is transparent except where Paper.js draws ocean/tree/etc. */
    body {
      position: fixed;
      inset: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #4AAFED 0%, #87CEEB 40%, #B0E0F0 65%, #E8F4F8 85%, #F5DEB3 92%, #DEB887 100%);
      transition: background 1s ease;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;   /* inset:0 alone doesn't override the canvas element's
                        intrinsic 300×150 sizing; explicit width/height does. */
      height: 100%;
      display: block;
      /* Prevent iOS Safari from hijacking touches for scroll/zoom/pull-to-refresh */
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Hurricane background — pure CSS psychedelic cycle, runs on compositor thread */
    @keyframes psychedelic {
      0%   { background-color: #1a0030; }
      14%  { background-color: #4b0082; }
      28%  { background-color: #8b0065; }
      42%  { background-color: #001a30; }
      56%  { background-color: #003a20; }
      70%  { background-color: #30002a; }
      84%  { background-color: #0a0033; }
      100% { background-color: #1a0030; }
    }

    .bg-storm {
      /* Clear the daytime gradient so background-color can show */
      background-image: none !important;
      animation: psychedelic 3s linear infinite !important;
      transition: none !important;
    }

    /* Splash overlay */
    #splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
    }

    #splash h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.6em;
    }

    #splash p {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      opacity: 0.6;
      margin-bottom: 2.5em;
    }

    #accept {
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      padding: 14px 48px;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #accept:hover {
      background: #fff;
      color: #000;
    }

    /* Shake hint */
    #shake {
      position: fixed;
      bottom: 8%;
      left: 0; right: 0;
      text-align: center;
      color: rgba(30, 30, 30, 0.55);
      font-size: 1.4rem;
      text-shadow: 0 1px 3px rgba(255,255,255,0.5);
      font-weight: 300;
      letter-spacing: 0.2em;
      z-index: 10;
      display: none;
      animation: fadeIn 2s ease-in;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Atas logo bottom-left */
    #atas-logo-link {
      position: fixed;
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      left: calc(14px + env(safe-area-inset-left, 0px));
      z-index: 60;
      display: block;
      line-height: 0;
    }
    #atas-logo {
      height: 28px;
      width: auto;
      opacity: 0.85;
      pointer-events: auto;
      filter: drop-shadow(0 1px 3px rgba(255,255,255,0.4));
      transition: opacity 0.2s ease;
    }
    #atas-logo-link:hover #atas-logo { opacity: 1; }


    /* Credits trigger bottom-right */
    #credits-trigger {
      position: fixed;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      right: calc(18px + env(safe-area-inset-right, 0px));
      z-index: 60;
      color: #b89968;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      text-shadow: 0 1px 2px rgba(255,255,255,0.45);
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 4px 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    #credits-trigger:hover { color: #8b6f47; }

    /* Credits popup bottom-right */
    #credits {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      right: calc(16px + env(safe-area-inset-right, 0px));
      z-index: 61;
      max-width: 260px;
      padding: 12px 36px 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      color: #222;
      font-size: 0.78rem;
      line-height: 1.45;
      border-radius: 10px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.18);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #credits a { color: #0a66c2; text-decoration: none; }
    #credits a:hover { text-decoration: underline; }
    #credits.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }
    #credits-close {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 22px; height: 22px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #555;
      line-height: 1;
      padding: 0;
    }
    #credits-close:hover { color: #000; }
  </style>
</head>
<body>

  <canvas id="canvas" resize data-paper-scope="1"></canvas>

  <div id="splash">
    <h1>Warning: Flashing Images, Loud Noises</h1>
    <p>Also: tropical weather.</p>
    <button id="accept" onclick="document.getElementById('splash').style.display='none'; document.dispatchEvent(new Event('palm-start'));">I can handle it</button>
  </div>

  <div id="shake">Move your mouse.</div>

  <a id="atas-logo-link" href="https://atas.vc" target="_blank" rel="noopener">
    <img id="atas-logo" src="atas-logo.png" alt="Atas VC">
  </a>

  <button id="credits-trigger" aria-label="Show credits">credits</button>

  <div id="credits" class="hidden">
    <button id="credits-close" aria-label="Close">×</button>
    <strong>Credits</strong><br>
    By Andrew from <a href="https://atas.vc" target="_blank" rel="noopener">atas.vc</a><br>
    Inspired by <a href="https://staggeringbeauty.com" target="_blank" rel="noopener">staggeringbeauty.com</a><br>
    Music: <a href="https://www.youtube.com/watch?v=fJWmbLS2_ec" target="_blank" rel="noopener">youtube</a>
  </div>

  <script src="paper.js"></script>
  <script src="Tween.js"></script>
  <script src="traer.js"></script>
  <script src="jiggler.js"></script>
  <script src="main.js" type="text/paperscript" canvas="canvas"></script>
  <script>
    // Credits popup toggle
    document.getElementById('credits-trigger').addEventListener('click', function() {
      document.getElementById('credits').classList.toggle('hidden');
    });
    document.getElementById('credits-close').addEventListener('click', function() {
      document.getElementById('credits').classList.add('hidden');
    });
  </script>

</body>
</html>
