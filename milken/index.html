const picker=document.getElementById("picker"),search=document.getElementById("search"),grid=document.getElementById("grid"),meta=document.getElementById("meta");
function buildOptions(ft=""){ft=ft.trim().toLowerCase();const titles=Object.keys(COUNTS).filter(t=>!ft||t.toLowerCase().includes(ft));titles.sort((a,b)=>{const ag=/^2026 global conf|milken institute global conference/i.test(a)?0:1;const bg=/^2026 global conf|milken institute global conference/i.test(b)?0:1;if(ag!==bg)return ag-bg;return a.toLowerCase().localeCompare(b.toLowerCase());});const prev=picker.value;picker.innerHTML="";const all=document.createElement("option");all.value="__ALL__";all.textContent=`All photos (${PHOTOS.length})`;picker.appendChild(all);for(const t of titles){const o=document.createElement("option");o.value=t;o.textContent=`${t} (${COUNTS[t]})`;picker.appendChild(o);}if([...picker.options].some(o=>o.value===prev))picker.value=prev;}
function render(){const sel=picker.value;const list=sel==="__ALL__"?PHOTOS:PHOTOS.filter(p=>p.t===sel);meta.textContent=`${list.length.toLocaleString()} photo${list.length===1?'':'s'}`+(sel==="__ALL__"?"":` · ${sel}`);if(!list.length){grid.innerHTML='<div class="empty">No photos.</div>';return;}const frag=document.createDocumentFragment();for(const p of list){const a=document.createElement("a");a.href=`https://www.flickr.com/photos/milkeninstitute/${p.i}/in/album-${SET_ID}/`;a.target="_blank";a.rel="noopener";const img=document.createElement("img");img.loading="lazy";img.src=p.u;img.alt=p.t;a.appendChild(img);frag.appendChild(a);}grid.innerHTML="";grid.appendChild(frag);}
picker.addEventListener("change",render);search.addEventListener("input",()=>buildOptions(search.value));
